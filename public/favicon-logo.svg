<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1A1A2A"/>
  
  <!-- Main square with logo design -->
  <g transform="translate(8, 8)">
    <!-- Orange square base -->
    <rect x="0" y="0" width="48" height="48" rx="4" fill="#F5A000"/>
    
    <!-- White connecting lines pattern (simplified for favicon) -->
    <!-- Top section - head area -->
    <circle cx="16" cy="12" r="3" fill="white"/>
    <circle cx="32" cy="10" r="3" fill="white"/>
    
    <!-- Connection lines -->
    <line x1="16" y1="15" x2="16" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="32" y1="13" x2="32" y2="26" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="28" x2="32" y2="26" stroke="white" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Bottom section - network nodes -->
    <circle cx="12" cy="38" r="2.5" fill="white"/>
    <circle cx="24" cy="40" r="2.5" fill="white"/>
    <circle cx="36" cy="39" r="2.5" fill="white"/>
    
    <!-- Network connections -->
    <line x1="16" y1="28" x2="12" y2="38" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="32" y1="26" x2="24" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="32" y1="26" x2="36" y2="39" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="38" x2="24" y2="40" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Border accent -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="rgba(245, 160, 0, 0.3)" stroke-width="1"/>
</svg>